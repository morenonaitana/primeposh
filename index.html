<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
  <title>Primeposh — Perfume Catalog 2026</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html {
      height: 100%;
      overflow-y: scroll;
      -webkit-overflow-scrolling: touch;
    }

    body {
      min-height: 100%;
      background: #1a1a1a;
      overflow-x: hidden;
      touch-action: pan-y pinch-zoom;
    }

    #splash {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 60px 24px;
    }

    .spinner {
      width: 32px;
      height: 32px;
      border: 2px solid rgba(255,255,255,.1);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    #viewer {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      padding: 0 0 4px;
    }

    canvas {
      display: block;
      width: 100%;
      height: auto;
    }

    @media (min-width: 768px) {
      #viewer { gap: 8px; padding-bottom: 8px; }
      canvas { max-width: 960px; box-shadow: 0 2px 16px rgba(0,0,0,.5); }
    }
  </style>
</head>
<body>
  <div id="splash">
    <div class="spinner"></div>
  </div>
  <div id="viewer"></div>

  <script>
    pdfjsLib.GlobalWorkerOptions.workerSrc = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

    function getScale(page) {
      var w = Math.min(document.documentElement.clientWidth, 960);
      var dpr = window.devicePixelRatio || 1;
      return (w / page.getViewport({ scale: 1 }).width) * dpr;
    }

    async function render() {
      var splash = document.getElementById("splash");
      var viewer = document.getElementById("viewer");

      try {
        var pdf = await pdfjsLib.getDocument("catalog.pdf").promise;
        var total = pdf.numPages;

        for (var i = 1; i <= total; i++) {
          var page = await pdf.getPage(i);
          var scale = getScale(page);
          var viewport = page.getViewport({ scale: scale });
          var canvas = document.createElement("canvas");
          canvas.width = viewport.width;
          canvas.height = viewport.height;
          viewer.appendChild(canvas);

          await page.render({
            canvasContext: canvas.getContext("2d"),
            viewport: viewport
          }).promise;

          if (i === 1) splash.remove();
        }
      } catch (e) {
        splash.innerHTML = '<div style="color:#aaa;font:14px sans-serif">Failed to load catalog</div>';
      }
    }

    render();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
  <title>Primeposh — Perfume Catalog 2026</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html {
      height: 100%;
      overflow-y: scroll;
      -webkit-overflow-scrolling: touch;
    }

    body {
      min-height: 100%;
      background: #2a2a2a;
      overflow-x: hidden;
    }

    #loading-screen {
      position: fixed;
      inset: 0;
      z-index: 10;
      background: #1a1a1a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 32px;
      transition: opacity .5s ease;
    }

    #loading-screen.hidden {
      opacity: 0;
      pointer-events: none;
    }

    #loading-screen h1 {
      font-family: "Georgia", "Times New Roman", serif;
      color: #e8e0d6;
      font-size: 1.6rem;
      font-weight: 400;
      letter-spacing: .12em;
      text-transform: uppercase;
      text-align: center;
      padding: 0 24px;
    }

    .spinner {
      width: 36px;
      height: 36px;
      border: 2px solid rgba(232,224,214,.15);
      border-top-color: #e8e0d6;
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    #progress {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: rgba(232,224,214,.45);
      font-size: 13px;
    }

    #viewer {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      padding: 4px 0;
    }

    canvas {
      display: block;
      width: 100%;
      height: auto;
      box-shadow: 0 2px 12px rgba(0,0,0,.4);
    }

    @media (min-width: 768px) {
      #viewer { gap: 8px; padding: 8px 0; }
      canvas { max-width: 900px; }
      #loading-screen h1 { font-size: 2rem; }
    }
  </style>
</head>
<body>
  <div id="loading-screen">
    <h1>Primeposh Perfume Catalog</h1>
    <div class="spinner"></div>
    <div id="progress">Loading…</div>
  </div>
  <div id="viewer"></div>

  <script>
    pdfjsLib.GlobalWorkerOptions.workerSrc = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

    function getScale(page) {
      var w = Math.min(window.innerWidth, 900);
      var dpr = window.devicePixelRatio || 1;
      return (w / page.getViewport({ scale: 1 }).width) * dpr;
    }

    async function render() {
      var progress = document.getElementById("progress");
      var loadingScreen = document.getElementById("loading-screen");

      try {
        progress.textContent = "Loading PDF…";
        var pdf = await pdfjsLib.getDocument("catalog.pdf").promise;
        var viewer = document.getElementById("viewer");
        var total = pdf.numPages;

        for (var i = 1; i <= total; i++) {
          progress.textContent = "Rendering page " + i + " of " + total + "…";
          var page = await pdf.getPage(i);
          var scale = getScale(page);
          var viewport = page.getViewport({ scale: scale });
          var canvas = document.createElement("canvas");
          canvas.width = viewport.width;
          canvas.height = viewport.height;
          viewer.appendChild(canvas);
          await page.render({ canvasContext: canvas.getContext("2d"), viewport: viewport }).promise;
        }

        loadingScreen.classList.add("hidden");
        setTimeout(function() { loadingScreen.style.display = "none"; }, 600);
      } catch (e) {
        progress.textContent = "Failed to load: " + e.message;
      }
    }

    render();
  </script>
</body>
</html>
